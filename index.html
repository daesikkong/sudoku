<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스도쿠 게임</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 스도쿠 게임</h1>
            <div class="error-count">에러: <span id="errorCount">0</span></div>
        </div>

        <div class="board" id="board"></div>

        <div class="buttons-container" id="numButtons"></div>

        <div class="control-buttons">
            <button class="reset-btn" onclick="resetGame()">게임 리셋</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 축하합니다!</h2>
            <p>퍼즐을 성공적으로 완료했습니다!</p>
            <button onclick="nextPuzzle()">다음 게임</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

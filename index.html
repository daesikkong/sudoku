<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스도쿠 게임</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 스도쿠 게임</h1>
            <div class="header-controls">
                <button id="themeToggle" class="theme-btn" onclick="toggleTheme()" title="테마 변경">🌙</button>
            </div>
        </div>

        <div class="game-info">
            <div class="difficulty">난이도: <span id="difficultyDisplay">쉬움</span></div>
            <div class="timer">시간: <span id="timer">00:00</span></div>
            <div class="error-count">에러: <span id="errorCount">0</span></div>
            <div class="hint-count">힌트: <span id="hintCount">0</span>/3</div>
        </div>

        <div class="difficulty-buttons">
            <button class="difficulty-btn easy-btn" onclick="changeDifficulty('easy')">쉬움</button>
            <button class="difficulty-btn medium-btn" onclick="changeDifficulty('medium')">중간</button>
            <button class="difficulty-btn hard-btn" onclick="changeDifficulty('hard')">어려움</button>
        </div>

        <div class="board" id="board"></div>

        <div class="buttons-container" id="numButtons"></div>

        <div class="control-buttons">
            <button class="hint-btn" onclick="useHint()">💡 힌트</button>
            <button class="reset-btn" onclick="resetGame()">게임 리셋</button>
        </div>

        <div class="records-section">
            <div id="recordsDisplay" class="records-display">
                <h3>🏆 최고 기록</h3>
                <div class="record-item">
                    <span class="record-difficulty">쉬움</span>
                    <span class="record-time">--:--</span>
                    <span class="record-errors">에러: -</span>
                    <span class="record-hints">힌트: -</span>
                </div>
                <div class="record-item">
                    <span class="record-difficulty">중간</span>
                    <span class="record-time">--:--</span>
                    <span class="record-errors">에러: -</span>
                    <span class="record-hints">힌트: -</span>
                </div>
                <div class="record-item">
                    <span class="record-difficulty">어려움</span>
                    <span class="record-time">--:--</span>
                    <span class="record-errors">에러: -</span>
                    <span class="record-hints">힌트: -</span>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 축하합니다!</h2>
            <p>퍼즐을 성공적으로 완료했습니다!</p>
            <button onclick="nextPuzzle()">다음 게임</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

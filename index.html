<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스도쿠 게임</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 650px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .error-count {
            font-size: 24px;
            font-weight: bold;
            color: #e74c3c;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 0;
            margin-bottom: 20px;
            border: 3px solid black;
            width: 600px;
            height: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            border: 1px solid #999;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s ease;
        }

        .tile:hover:not(.fixed) {
            background-color: #f0f0f0;
        }

        .tile.fixed {
            background-color: #d3d3d3;
            cursor: not-allowed;
            font-weight: bold;
        }

        .tile.filled {
            background-color: #e8f8f5;
            color: #27ae60;
        }

        .tile.selected {
            background-color: #fff3cd;
        }

        /* 굵은 테두리 */
        .tile:nth-child(3n) {
            border-right: 3px solid black;
        }

        .tile:nth-child(3n + 1) {
            border-left: 1px solid #999;
        }

        .tile:nth-child(n + 19):nth-child(-n + 27),
        .tile:nth-child(n + 55):nth-child(-n + 63) {
            border-bottom: 3px solid black;
        }

        .tile:nth-child(n + 1):nth-child(-n + 9),
        .tile:nth-child(n + 28):nth-child(-n + 36),
        .tile:nth-child(n + 64):nth-child(-n + 72) {
            border-top: 1px solid #999;
        }

        .tile:nth-child(9n + 1),
        .tile:nth-child(9n + 2),
        .tile:nth-child(9n + 3) {
            border-left: 3px solid black;
        }

        .tile:nth-child(9n + 7),
        .tile:nth-child(9n + 8),
        .tile:nth-child(9n + 9) {
            border-right: 3px solid black;
        }

        .tile:nth-child(-n + 3),
        .tile:nth-child(n + 10):nth-child(-n + 12),
        .tile:nth-child(n + 19):nth-child(-n + 21) {
            border-top: 3px solid black;
        }

        .tile:nth-child(n + 73):nth-child(-n + 75),
        .tile:nth-child(n + 82):nth-child(-n + 84),
        .tile:nth-child(n + 73):nth-child(-n + 81) {
            border-bottom: 3px solid black;
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .num-btn {
            width: 60px;
            height: 60px;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #3498db;
            background-color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .num-btn:hover {
            background-color: #ecf0f1;
        }

        .num-btn.selected {
            background-color: #d3d3d3;
            border-color: #2c3e50;
        }

        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .control-buttons button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-btn {
            background-color: #e74c3c;
            color: white;
        }

        .reset-btn:hover {
            background-color: #c0392b;
        }

        .next-btn {
            background-color: #27ae60;
            color: white;
        }

        .next-btn:hover {
            background-color: #229954;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .modal-content h2 {
            color: #27ae60;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .modal-content button {
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        .modal-content button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 스도쿠 게임</h1>
            <div class="error-count">에러: <span id="errorCount">0</span></div>
        </div>

        <div class="board" id="board"></div>

        <div class="buttons-container" id="numButtons"></div>

        <div class="control-buttons">
            <button class="reset-btn" onclick="resetGame()">게임 리셋</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2>🎉 축하합니다!</h2>
            <p>퍼즐을 성공적으로 완료했습니다!</p>
            <button onclick="nextPuzzle()">다음 게임</button>
        </div>
    </div>

    <script>
        const puzzles = [
            [
                "--74916-5",
                "2---6-3-9",
                "-----7-1-",
                "-586----4",
                "--3----9-",
                "--62--187",
                "9-4-7---2",
                "67-83----",
                "81--45---"
            ],
            [
                "53--7----",
                "6--195---",
                "-98----6-",
                "8---6---3",
                "4--8-3--1",
                "7---2---6",
                "-6----28-",
                "---419--5",
                "----8--79"
            ]
        ];

        const solutions = [
            [
                "387491625",
                "241568379",
                "569327418",
                "758619234",
                "123784596",
                "496253187",
                "934176852",
                "675832941",
                "812945763"
            ],
            [
                "534672981",
                "672195348",
                "198345627",
                "859761423",
                "426853791",
                "713929856",
                "961537284",
                "287419635",
                "345286179"
            ]
        ];

        let currentPuzzle = 0;
        let errors = 0;
        let numSelected = null;
        let tiles = [];

        // 초기화
        function init() {
            errors = 0;
            numSelected = null;
            tiles = [];
            document.getElementById('errorCount').textContent = '0';
            document.getElementById('winModal').classList.remove('show');
            setupTiles();
            setupButtons();
        }

        // 타일 설정
        function setupTiles() {
            const board = document.getElementById('board');
            board.innerHTML = '';

            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = r;
                    tile.dataset.col = c;

                    const char = puzzles[currentPuzzle][r][c];
                    if (char !== '-') {
                        tile.textContent = char;
                        tile.classList.add('fixed');
                    }

                    tile.addEventListener('click', () => handleTileClick(r, c, tile));
                    board.appendChild(tile);
                    tiles.push({ element: tile, row: r, col: c, filled: char !== '-' });
                }
            }
        }

        // 숫자 버튼 설정
        function setupButtons() {
            const container = document.getElementById('numButtons');
            container.innerHTML = '';

            for (let i = 1; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => selectNumber(btn, i));
                container.appendChild(btn);
            }
        }

        // 숫자 선택
        function selectNumber(btn, num) {
            if (numSelected) {
                numSelected.classList.remove('selected');
            }
            numSelected = btn;
            numSelected.classList.add('selected');
        }

        // 타일 클릭 처리
        function handleTileClick(r, c, tile) {
            if (tile.classList.contains('fixed') || tile.textContent) {
                return;
            }

            if (!numSelected) {
                alert('먼저 숫자를 선택해주세요!');
                return;
            }

            const selectedNum = numSelected.textContent;
            const correct = solutions[currentPuzzle][r][c];

            if (selectedNum === correct) {
                tile.textContent = selectedNum;
                tile.classList.add('filled');
                checkWin();
            } else {
                errors++;
                document.getElementById('errorCount').textContent = errors;
                tile.classList.add('selected');
                setTimeout(() => {
                    tile.classList.remove('selected');
                }, 300);
            }
        }

        // 우승 조건 확인
        function checkWin() {
            const allFilled = tiles.every(t => t.element.textContent !== '');
            const allCorrect = tiles.every(t => {
                if (t.element.textContent === '') return false;
                return t.element.textContent === solutions[currentPuzzle][t.row][t.col];
            });

            if (allFilled && allCorrect) {
                document.getElementById('winModal').classList.add('show');
            }
        }

        // 게임 리셋
        function resetGame() {
            init();
        }

        // 다음 퍼즐
        function nextPuzzle() {
            currentPuzzle = (currentPuzzle + 1) % puzzles.length;
            init();
        }

        // 게임 시작
        init();
    </script>
</body>
</html>
